<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operations Tracking Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 font-sans p-6 text-gray-800">

    <header class="mb-8 flex justify-between items-center border-b border-gray-200 pb-4">
        <div>
            <h1 class="text-3xl font-bold text-gray-900">Operations & Transition Tracking</h1>
            <p class="text-sm text-gray-500">Live data synced from Salesforce</p>
        </div>
        <div class="text-right">
            <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">
                <span class="h-2 w-2 rounded-full bg-green-400 mr-2 animate-pulse"></span> Live
            </span>
            <p id="last-updated" class="text-xs text-gray-400 mt-1">Loading...</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto space-y-6">
        <section class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-100">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Total Volume (YTD)</h3>
                <p id="kpi-total" class="text-2xl font-bold text-gray-900 mt-2">--</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-100">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Active Pipeline</h3>
                <p id="kpi-pipeline" class="text-2xl font-bold text-blue-600 mt-2">--</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-100">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Avg First Touch</h3>
                <p id="kpi-touch" class="text-2xl font-bold text-gray-900 mt-2">--</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-100">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Target SLA Met</h3>
                <p id="kpi-sla" class="text-2xl font-bold text-green-600 mt-2">--</p>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-100">
                <h3 class="text-md font-bold text-gray-700 mb-4">Volume by Transition Type</h3>
                <div class="relative h-64">
                    <canvas id="transitionChart"></canvas>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-100">
                <h3 class="text-md font-bold text-gray-700 mb-4">Pipeline Status Breakdown</h3>
                <div class="relative h-64">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script>
        async function loadDashboardData() {
            try {
                // Fetch the data.json file from the same directory
                const response = await fetch('./data.json');
                const data = await response.json();

                // Update Timestamps & KPIs
                document.getElementById('last-updated').innerText = `Last Updated: ${data.lastUpdated}`;
                document.getElementById('kpi-total').innerText = data.kpis.totalVolume;
                document.getElementById('kpi-pipeline').innerText = data.kpis.activePipeline;
                document.getElementById('kpi-touch').innerText = data.kpis.avgFirstTouch;
                document.getElementById('kpi-sla').innerText = data.kpis.slaMetPercentage;

                // Render Transition Chart
                new Chart(document.getElementById('transitionChart'), {
                    type: 'bar',
                    data: {
                        labels: Object.keys(data.transitionTypes),
                        datasets: [{
                            label: 'Cases',
                            data: Object.values(data.transitionTypes),
                            backgroundColor: '#3b82f6',
                            borderRadius: 6
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });

                // Render Status Chart
                new Chart(document.getElementById('statusChart'), {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(data.pipelineStatus),
                        datasets: [{
                            data: Object.values(data.pipelineStatus),
                            backgroundColor: ['#f59e0b', '#3b82f6', '#10b981', '#ef4444']
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });

            } catch (error) {
                console.error("Error loading dashboard data:", error);
                document.getElementById('last-updated').innerText = "Error loading data.";
            }
        }

        // Run on page load
        window.onload = loadDashboardData;
    </script>
</body>
</html>
